<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Dispatch System (FDS) | Reimagining AI-first Fleet Dispatch System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Albert Sans', 'sans-serif'],
              display: ['Spectral', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              brand: {
                50: 'var(--brand-50)',
                100: 'var(--brand-100)',
                200: 'var(--brand-200)',
                300: 'var(--brand-300)',
                400: 'var(--brand-400)',
                500: 'var(--brand-500)',
                600: 'var(--brand-600)',
                700: 'var(--brand-700)',
                800: 'var(--brand-800)',
                900: 'var(--brand-900)',
              },
              slate: {
                50: '#faf9f8',
                100: '#f4f2f0',
                200: '#e8e5e1',
                300: '#d6d2cd',
                400: '#b5b0a8',
                500: '#948f87',
                600: '#736e66',
                700: '#5c5852',
                800: '#4a4642',
                900: '#3d3a36',
                950: '#292724',
              }
            },
            boxShadow: {
              'soft-sm': '0 1px 2px 0 rgba(0, 0, 0, 0.04)',
              'soft-md': '0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
              'soft-xl': '0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02)',
              'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.04)',
              'hard': 'none',
              'hard-lg': 'none',
            },
            animation: {
              'bell-shake': 'bell-shake 0.5s ease-in-out both',
            },
            keyframes: {
              'bell-shake': {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '20%': { transform: 'rotate(-15deg)' },
                '40%': { transform: 'rotate(10deg)' },
                '60%': { transform: 'rotate(-5deg)' },
                '80%': { transform: 'rotate(2deg)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --brand-50: #fdf8f6;
        --brand-100: #f2e8e5;
        --brand-200: #eaddd7;
        --brand-300: #e0cec7;
        --brand-400: #d2bab0;
        --brand-500: #D97757;
        --brand-600: #c25e3e;
        --brand-700: #a34729;
        --brand-800: #85351c;
        --brand-900: #6b2a17;
      }
      
      .theme-midnight {
        --brand-50: #f8fafc;
        --brand-100: #f1f5f9;
        --brand-200: #e2e8f0;
        --brand-300: #cbd5e1;
        --brand-400: #94a3b8;
        --brand-500: #64748b;
        --brand-600: #475569;
        --brand-700: #334155;
        --brand-800: #1e293b;
        --brand-900: #0f172a;
      }

      .theme-ocean {
        --brand-50: #f0f9ff;
        --brand-100: #e0f2fe;
        --brand-200: #bae6fd;
        --brand-300: #7dd3fc;
        --brand-400: #38bdf8;
        --brand-500: #0ea5e9;
        --brand-600: #0284c7;
        --brand-700: #0369a1;
        --brand-800: #075985;
        --brand-900: #0c4a6e;
      }

      body {
        background-color: #FAF9F6;
        color: #292724;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      
      /* Markdown Enhancements */
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
        font-family: 'Spectral', serif;
        color: #85351c; /* brand-800 */
        margin-top: 1.2em;
        margin-bottom: 0.5em;
        font-weight: 600;
      }
      .markdown-body strong {
        color: #a34729; /* brand-700 */
        font-weight: 600;
      }
      .markdown-body ul {
        list-style-type: disc;
        padding-left: 1.5em;
        margin-bottom: 1em;
      }
      .markdown-body li {
        margin-bottom: 0.25em;
      }
      
      /* Shimmer Animation */
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .shimmer-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        animation: shimmer 1.5s infinite;
        pointer-events: none;
      }
      
      /* Breathing Animation */
      @keyframes breathe {
        0% {
          transform: scale(1);
          box-shadow: 0 0 15px rgba(217, 119, 87, 0.4), 0 0 30px rgba(217, 119, 87, 0.2);
        }
        50% {
          transform: scale(1.15);
          box-shadow: 0 0 25px rgba(217, 119, 87, 0.8), 0 0 50px rgba(217, 119, 87, 0.4);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 15px rgba(217, 119, 87, 0.4), 0 0 30px rgba(217, 119, 87, 0.2);
        }
      }
      .breathing-btn {
        animation: breathe 3s ease-in-out infinite;
      }
      .breathing-btn:hover {
        animation-play-state: paused;
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(217, 119, 87, 0.6);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.5.1",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.559.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.32.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "pigeon-maps": "https://esm.sh/pigeon-maps@0.21.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
