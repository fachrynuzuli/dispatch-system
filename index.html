<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Dispatch System (FDS) | Reimagining AI-first Fleet Dispatch System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Albert Sans', 'sans-serif'],
              display: ['Spectral', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              brand: {
                50: '#fdf8f6',
                100: '#f2e8e5',
                200: '#eaddd7',
                300: '#e0cec7',
                400: '#d2bab0',
                500: '#D97757', // Claude-like rust/amber
                600: '#c25e3e',
                700: '#a34729',
                800: '#85351c',
                900: '#6b2a17',
              },
              slate: {
                50: '#faf9f8',
                100: '#f4f2f0',
                200: '#e8e5e1',
                300: '#d6d2cd',
                400: '#b5b0a8',
                500: '#948f87',
                600: '#736e66',
                700: '#5c5852',
                800: '#4a4642',
                900: '#3d3a36',
                950: '#292724',
              }
            },
            boxShadow: {
              'soft-sm': '0 1px 2px 0 rgba(0, 0, 0, 0.04)',
              'soft-md': '0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
              'soft-xl': '0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02)',
              'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.04)',
              'hard': 'none',
              'hard-lg': 'none',
            },
            animation: {
              'bell-shake': 'bell-shake 0.5s ease-in-out both',
            },
            keyframes: {
              'bell-shake': {
                '0%, 100%': { transform: 'rotate(0deg)' },
                '20%': { transform: 'rotate(-15deg)' },
                '40%': { transform: 'rotate(10deg)' },
                '60%': { transform: 'rotate(-5deg)' },
                '80%': { transform: 'rotate(2deg)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #FAF9F6;
        color: #292724;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.5.1",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.559.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.32.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "pigeon-maps": "https://esm.sh/pigeon-maps@0.21.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
